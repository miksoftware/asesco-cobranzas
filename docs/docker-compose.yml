name: cobranzas

services:
  php:
    build: .
    container_name: cobranzas_php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./php-config/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - cobranzas_network
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=true

  mysql:
    image: mysql:8.0
    container_name: cobranzas_mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=64M
      - --max-connections=50
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cobranzas_db
      MYSQL_USER: cobranzas_user
      MYSQL_PASSWORD: c2LNfaalWprI7faL
    volumes:
      - cobranzas_mysql_data:/var/lib/mysql
    ports:
      - "3309:3306"
    networks:
      - cobranzas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: cobranzas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - cobranzas_redis_data:/data
    networks:
      - cobranzas_network
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: cobranzas_nginx
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - cobranzas_network

networks:
  cobranzas_network:
    driver: bridge

volumes:
  cobranzas_mysql_data:
  cobranzas_redis_data:
